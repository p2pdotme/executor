version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: executor-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  executor:
    build: .
    image: executor:local
    container_name: executor
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    command: ["node", "--enable-source-maps", "dist/index.js"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 2s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
